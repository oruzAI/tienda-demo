<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tienda Demo</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="hero">
    <p class="etiqueta">PRODUCTOS DIGITALES</p>
    <h1>Encuentra tu próximo recurso</h1>
    <p class="subtitulo">
      Productos digitales con información actualizada desde Google Sheets.

  <main>
    <section class="productos-seccion">

      <div id="productos" class="carrusel">

    </section>
  </main>

  <footer>
    <p>Tienda Demo © 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
